<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Akademi Crypto — Modul</title>
  <link rel="icon" type="image/jpeg" href="image/WhatsApp Image 2025-12-05 at 22.34.51.jpeg">
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Crypto theme: purple/violet colors - matching logo */
    :root{
      --page-bg:#0f0a14;         /* dark purple-black background */
      --banner-bg:#000000;       /* top banner */
      --panel-bg:#1a0f1f;        /* content panel with purple tint */
      --card-bg:#2a1f35;         /* module card background (purple) */
      --card-border:#1f1525;     /* subtle card border */
      --text-main:#f3e8ff;       /* primary text (light purple) */
      --text-muted:#c084fc;      /* muted/meta text (purple) */
      --accent:#a855f7;          /* accent purple */
      --accent-violet:#8b5cf6;   /* violet accent */
      --accent-lavender:#c4b5fd;  /* lavender accent */
      --accent-indigo:#6366f1;   /* indigo accent */
      --accent-pink:#ec4899;     /* pink accent for variety */
    }

    .cat-dot {width:12px;height:12px;border-radius:3px}
    .lvl-begin{background-color:#10b981}
    .lvl-int{background-color:#f59e0b}
    .lvl-adv{background-color:#ef4444}
    .cat-invest{background-color:#a855f7}
    .cat-live{background-color:#6366f1}
    .cat-mind{background-color:#8b5cf6}
    .cat-trade{background-color:#c084fc}
    .cat-tut{background-color:#ec4899}
    .cat-crypto{background-color:#a855f7}

    /* Responsive animations */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    .fade-anim { opacity: 0; transform: translateY(8px); }
    .fade-in { animation: fadeInUp 420ms ease forwards; }

    /* Page and panel backgrounds */
    body, .min-h-screen { 
      background: linear-gradient(135deg, var(--page-bg) 0%, #1a0f1f 50%, #0f0a14 100%);
      color: var(--text-main); 
    }
    .bg-gray-800 { background-color: var(--panel-bg) !important; }
    .card-style { 
      background: var(--card-bg); 
      color: var(--text-main); 
      border: 1px solid var(--card-border);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      z-index: 1;
      cursor: pointer;
      padding: 0;
    }
    
    .module-thumbnail {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, rgba(168,85,247,0.3) 0%, rgba(139,92,246,0.2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .module-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }
    
    .module-content {
      padding: 1rem;
    }
    
    .module-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }
    
    .module-subtitle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    
    .play-icon {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
    }
    
    .module-level {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(0, 0, 0, 0.7);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: white;
    }
    
    .card-style::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(168,85,247,0.2) 0%, rgba(139,92,246,0.1) 50%, rgba(236,72,153,0.05) 70%);
      transform: scale(0);
      opacity: 0;
      transition: transform 0.6s ease, opacity 0.6s ease;
      z-index: -1;
      pointer-events: none;
    }
    
    .card-style:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px -5px rgba(168,85,247,0.3), 0 0 25px rgba(139,92,246,0.2), 0 0 15px rgba(236,72,153,0.1);
    }
    
    .card-style:hover::before {
      transform: scale(1);
      opacity: 1;
    }
    .card-style h3 { color: var(--text-main); }
    .card-style .meta { color: var(--text-muted); }
    .badge-contrast { 
      background: linear-gradient(135deg, rgba(168,85,247,0.2) 0%, rgba(139,92,246,0.15) 100%); 
      color: var(--text-main); 
      padding: 0.25rem 0.5rem; 
      border-radius: 0.375rem; 
      font-weight:600; 
      border: 1px solid rgba(168,85,247,0.4);
      box-shadow: 0 2px 4px rgba(168,85,247,0.1);
    }
    .panel-title{ color: var(--text-main); }
    .result-count{ color: var(--text-muted); }
    .btn-focus:focus { box-shadow: 0 0 0 4px rgba(168,85,247,0.3); outline: none }
    
    /* Module Detail Page Styles */
    .module-detail-page {
      display: none;
      min-height: 100vh;
    }
    
    .module-detail-page.active {
      display: block;
    }
    
    .main-module-list.hidden {
      display: none;
    }
    
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 0;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    
    .breadcrumb a {
      color: var(--text-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    
    .breadcrumb a:hover {
      color: var(--accent);
    }
    
    .breadcrumb-separator {
      color: var(--text-muted);
    }
    
    .module-banner {
      width: 100%;
      min-height: 400px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      padding: 2rem;
    }
    
    .module-banner-content {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    
    .module-detail-content {
      max-width: 72rem;
      margin-left: auto;
      margin-right: auto;
      padding-left: 1rem;
      padding-right: 1rem;
      padding-bottom: 2rem;
    }
    
    .module-detail-title {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: 3rem;
    }
    
    .youtube-button-container {
      display: flex;
      justify-content: center;
      margin: 2rem 0;
    }
    
    .youtube-button {
      background: #ff0000;
      color: white;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1.125rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    
    .youtube-button:hover {
      background: #cc0000;
      transform: translateY(-2px);
    }
    
    .youtube-button svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }
    
    .action-buttons-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }
    
    .pdf-button {
      background: #dc2626;
      color: white;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1.125rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.2s ease, transform 0.2s ease;
      border: none;
      cursor: pointer;
    }
    
    .pdf-button:hover {
      background: #b91c1c;
      transform: translateY(-2px);
    }
    
    .pdf-button svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }
    
    .materials-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    
    .module-description {
      max-width: 800px;
      margin: 0 auto 3rem;
      padding: 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 0.5rem;
      color: var(--text-main);
      font-size: 1.125rem;
      line-height: 1.8;
      text-align: center;
    }
    
    .materials-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: white;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    
    .materials-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .material-button {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      text-align: left;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .material-button:hover {
      background: var(--panel-bg);
      border-color: var(--accent);
      transform: translateX(4px);
    }
    
    .material-button .material-name {
      flex: 1;
    }
    
    .material-button .material-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
      opacity: 0.7;
    }
    
    .material-button:hover .material-icon {
      opacity: 1;
    }

    /* Back Button Styles */
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      margin-bottom: 1rem;
    }
    
    .back-button:hover {
      background: var(--panel-bg);
      border-color: var(--accent);
      transform: translateX(-4px);
    }
    
    .back-button svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* Responsive improvements */
    @media (max-width: 768px) {
      .grid-responsive {
        grid-template-columns: 1fr !important;
      }
      .sidebar-mobile {
        position: sticky;
        top: 0;
        z-index: 10;
        max-height: 60vh;
        overflow-y: auto;
      }
    }
  </style>
</head>

        <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>

  <script>
    const categoriesEl = document.getElementById('categories');
    const modulesEl = document.getElementById('modules');
    const resultCount = document.getElementById('result-count');

    let selectedCat = 'All';
    let searchQuery = '';
    let allModules = [];
    const searchInput = document.getElementById('searchInput');

    if(searchInput) {
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase().trim();
        applyFilter();
      });
    }

    function renderModules(list){
      modulesEl.innerHTML = '';
      list.forEach((m,i)=>{
        const card = document.createElement('div');
        card.className = 'card-style rounded-lg shadow-sm transform fade-anim';
        card.dataset.cat = m.category;

        // Thumbnail section
        const thumbnail = document.createElement('div');
        thumbnail.className = 'module-thumbnail';
        
        // Create thumbnail image or use placeholder
        const thumbnailImg = document.createElement('div');
        thumbnailImg.className = 'module-thumbnail';
        
        // Use thumbnail image if provided, otherwise use gradient
        if (m.thumbnail && m.thumbnail.trim() !== '') {
          const img = document.createElement('img');
          img.src = m.thumbnail;
          img.alt = m.title;
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'cover';
          thumbnailImg.appendChild(img);
          card.dataset.thumbnail = m.thumbnail;
        } else {
          const thumbnailBg = `linear-gradient(135deg, rgba(168,85,247,0.4) 0%, rgba(139,92,246,0.3) 50%, rgba(236,72,153,0.2) 100%)`;
          thumbnailImg.style.background = thumbnailBg;
          card.dataset.thumbnailBg = thumbnailBg;
        }
        
        // Content section
        const content = document.createElement('div');
        content.className = 'module-content';
        
        // Title
        const title = document.createElement('h3');
        title.className = 'module-title';
        title.textContent = m.title;
        
        // Subtitle with play icon
        const subtitle = document.createElement('div');
        subtitle.className = 'module-subtitle';
        subtitle.innerHTML = `
          <svg class="play-icon" fill="currentColor" viewBox="0 0 20 20">
            <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
          </svg>
          <span>${m.title}</span>
        `;

        card.appendChild(thumbnailImg);
        card.appendChild(content);
        content.appendChild(title);
        content.appendChild(subtitle);
        
        setTimeout(()=>{
          card.classList.add('fade-in');
          card.style.opacity = '';
        }, i * 70);

        modulesEl.appendChild(card);
      });
    }

    function updateCount(visible){
      if(visible===0) resultCount.textContent = 'Tidak ada modul ditemukan';
      else if(selectedCat==='All') resultCount.textContent = `Menampilkan semua modul (${visible})`;
      else resultCount.textContent = `Menampilkan ${visible} modul`;
    }

    function applyFilter(){
      const filtered = allModules.filter(m=>{
        if(selectedCat!=='All' && m.category!==selectedCat) return false;
        if(searchQuery !== '') {
          const titleMatch = m.title.toLowerCase().includes(searchQuery);
          const catMatch = (m.category || '').toLowerCase().includes(searchQuery);
          if(!titleMatch && !catMatch) return false;
        }
        return true;
      });
      renderModules(filtered);
      updateCount(filtered.length);
    }

    categoriesEl.addEventListener('click', e=>{
      const btn = e.target.closest('button[data-cat]');
      if(!btn) return;
      categoriesEl.querySelectorAll('button').forEach(b=>{
        b.classList.remove('ring','ring-offset-2','ring-purple-400','bg-purple-700/50');
        if(!b.classList.contains('bg-purple-700/50')) b.classList.add('bg-gray-700');
      });
      btn.classList.add('ring','ring-offset-2','ring-purple-400','bg-purple-700/50');
      btn.classList.remove('bg-gray-700');
      selectedCat = btn.dataset.cat;
      applyFilter();
    });

    fetch('data/akademi-crypto.json')
      .then(r=>r.json())
      .then(data=>{
        allModules = data.modules || [];
        renderModules(allModules);
        updateCount(allModules.length);
      })
      .catch(err=>{
        console.warn('Fetch data/akademi-crypto.json failed, using embedded sample', err);
        allModules = [
          {id:1,title:'Crypto Dasar',category:'Blockchain Technology',level:0,description:'Pengenalan cryptocurrency dan blockchain.'},
          {id:2,title:'Trading Crypto',category:'Crypto Trading',level:1,description:'Strategi trading cryptocurrency untuk pemula.'},
          {id:3,title:'Analisis Teknis Crypto',category:'Crypto Investing',level:2,description:'Teknik analisis chart dan indikator untuk crypto.'}
        ];
        renderModules(allModules);
        updateCount(allModules.length);
      });

    // Module Detail Page Elements
    const moduleDetailPage = document.getElementById('module-detail-page');
    const mainModuleList = document.querySelector('.main-module-list');
    const moduleBanner = document.getElementById('module-banner');
    const moduleBannerContent = document.getElementById('module-banner-content');
    const moduleDetailTitle = document.getElementById('module-detail-title');
    const breadcrumbTitleText = document.getElementById('breadcrumb-title-text');
    const breadcrumbModules = document.getElementById('breadcrumb-modules');
    const breadcrumbCategoryText = document.getElementById('breadcrumb-category-text');
    const materialsList = document.getElementById('materials-list');
    const moduleDescription = document.getElementById('module-description');
    const actionButtonsContainer = document.getElementById('action-buttons-container');
    const pdfButton = document.getElementById('pdf-button');

    function renderMaterials(materials, moduleTitle) {
      materialsList.innerHTML = '';
      
      if (!materials || materials.length === 0) {
        // Default materials if none provided
        materials = [
          { name: (moduleTitle || 'Materi') + ' - Part 1', url: 'https://www.youtube.com' },
          { name: (moduleTitle || 'Materi') + ' - Part 2', url: 'https://www.youtube.com' }
        ];
      }
      
      materials.forEach((material, index) => {
        const materialButton = document.createElement('a');
        materialButton.href = material.url || material.youtube_url || 'https://www.youtube.com';
        materialButton.target = '_blank';
        materialButton.className = 'material-button';
        materialButton.innerHTML = `
          <span class="material-name">${material.name || material.title || `Materi ${index + 1}`}</span>
          <svg class="material-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        `;
        materialsList.appendChild(materialButton);
      });
    }

    function openModule(data, sourceEl){
      // Check if banner has HTML content
      if (data.banner_html && data.banner_html.trim() !== '') {
        // Use HTML content for banner
        moduleBannerContent.innerHTML = data.banner_html;
        moduleBannerContent.style.display = 'block';
        moduleBanner.style.backgroundImage = '';
        moduleBanner.style.background = data.banner_bg || 'linear-gradient(135deg, rgba(168,85,247,0.2) 0%, rgba(139,92,246,0.15) 50%, rgba(236,72,153,0.1) 100%)';
      } else {
        // Use banner image (prioritize banner_image, fallback to thumbnail)
        const bannerImage = data.banner_image || data.banner_url || data.thumbnail || sourceEl?.dataset?.thumbnail;
        moduleBannerContent.innerHTML = '';
        moduleBannerContent.style.display = 'none';
        
        if (bannerImage && bannerImage.trim() !== '') {
          // Use banner image
          moduleBanner.style.backgroundImage = `url('${bannerImage}')`;
          moduleBanner.style.backgroundSize = 'contain';
          moduleBanner.style.backgroundRepeat = 'no-repeat';
          moduleBanner.style.backgroundPosition = 'center';
          moduleBanner.style.backgroundColor = 'var(--page-bg)';
        } else {
          // Use gradient background
          const thumbnailBg = sourceEl?.dataset?.thumbnailBg || `linear-gradient(135deg, rgba(168,85,247,0.4) 0%, rgba(139,92,246,0.3) 50%, rgba(236,72,153,0.2) 100%)`;
          moduleBanner.style.background = thumbnailBg;
          moduleBanner.style.backgroundImage = '';
        }
      }
      
      // Set title
      moduleDetailTitle.textContent = data.title;
      breadcrumbTitleText.textContent = data.title;
      
      // Set description
      if (data.description) {
        moduleDescription.textContent = data.description;
        moduleDescription.style.display = 'block';
      } else {
        moduleDescription.style.display = 'none';
      }
      
      // Set PDF/Summary button
      if (data.pdf_url && data.pdf_url.trim() !== '') {
        pdfButton.href = data.pdf_url;
        actionButtonsContainer.style.display = 'flex';
      } else if (data.summary_url && data.summary_url.trim() !== '') {
        pdfButton.href = data.summary_url;
        actionButtonsContainer.style.display = 'flex';
      } else {
        actionButtonsContainer.style.display = 'none';
      }
      
      // Set category in breadcrumb (show the module's category instead of "Semua Modul")
      breadcrumbCategoryText.textContent = data.category || 'Semua Modul';
      
      // Render materials list - use materials from data if available
      renderMaterials(data.materials || data.submodules || [], data.title);
      
      // Hide main list and show detail page
      mainModuleList.classList.add('hidden');
      moduleDetailPage.classList.add('active');
      
      // Scroll to top
      window.scrollTo(0, 0);
    }

    function closeModuleDetail(){
      moduleDetailPage.classList.remove('active');
      mainModuleList.classList.remove('hidden');
    }

    // Breadcrumb navigation
    document.getElementById('breadcrumb-category').addEventListener('click', (e) => {
      e.preventDefault();
      closeModuleDetail();
    });
    
    breadcrumbModules.addEventListener('click', (e) => {
      e.preventDefault();
      closeModuleDetail();
    });

    modulesEl.addEventListener('click', (e)=>{
      const card = e.target.closest('[data-cat]');
      if(!card) return;
      const titleEl = card.querySelector('h3');
      const title = titleEl ? titleEl.textContent : null;
      if(!title) return;
      const mod = allModules.find(m=>m.title === title);
      if(mod) openModule(mod, card);
    });
  </script>
</body>
</html>
