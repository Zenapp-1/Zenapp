<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Trade with Suli</title>
  <link rel="icon" type="image/jpeg" href="image/WhatsApp Image 2025-12-05 at 22.34.51.jpeg">
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* theme colors and contrast tuned to screenshot */
    :root {
      --page-bg: #050a15;
      /* overall page background */
      --banner-bg: #02050a;
      /* top banner */
      --panel-bg: #0a1128;
      /* content panel */
      --card-bg: #111d40;
      /* module card background */
      --card-border: rgba(42, 98, 253, 0.2);
      /* subtle card border */
      --text-main: #f3f4f6;
      /* primary text */
      --text-muted: #9ca3af;
      /* muted/meta text */
      --accent: #2a62fd;
      /* accent Suli blue */
    }

    /* interactive animation code moved to script block; kept style block clean */
    .cat-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px
    }

    .lvl-begin {
      background-color: #16a34a
    }

    .lvl-int {
      background-color: #f59e0b
    }

    .lvl-adv {
      background-color: #dc2626
    }

    .cat-invest {
      background-color: #06b6d4
    }

    .cat-live {
      background-color: #3b82f6
    }

    .cat-mind {
      background-color: #8b5cf6
    }

    .cat-trade {
      background-color: #f97316
    }

    .cat-tut {
      background-color: #10b981
    }

    .cat-must {
      background-color: #facc15
    }

    .cat-start {
      background-color: #ffffff
    }

    .cat-Wajib {
      background-color: #ffffff
    }

    /* animation and improved contrast styles */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-anim {
      opacity: 0;
      transform: translateY(8px);
    }

    .fade-in {
      animation: fadeInUp 420ms ease forwards;
    }

    /* page and panel backgrounds */
    body,
    .min-h-screen {
      background: var(--page-bg);
      color: var(--text-main);
    }

    .bg-gray-800 {
      background-color: var(--panel-bg) !important;
    }

    .card-style {
      background: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--card-border);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      z-index: 1;
      padding: 0;
    }

    .module-thumbnail {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.3) 0%, rgba(59, 130, 246, 0.2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .module-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .module-content {
      padding: 1rem;
    }

    .module-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .module-subtitle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .play-icon {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
    }

    .module-level {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(0, 0, 0, 0.7);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: white;
    }

    .card-style::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(42, 98, 253, 0.15) 0%, rgba(42, 98, 253, 0) 70%);
      transform: scale(0);
      opacity: 0;
      transition: transform 0.6s ease, opacity 0.6s ease;
      z-index: -1;
      pointer-events: none;
    }

    .card-style:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(42, 98, 253, 0.3);
    }

    .card-style:hover::before {
      transform: scale(1);
      opacity: 1;
    }

    .card-style h3 {
      color: var(--text-main);
    }

    .card-style .meta {
      color: var(--text-muted);
    }

    .badge-contrast {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
      font-weight: 600
    }

    .panel-title {
      color: var(--text-main);
    }

    .result-count {
      color: var(--text-muted);
    }

    /* hover focus ring for buttons */
    .btn-focus:focus {
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
      outline: none
    }

    /* Module Detail Page Styles */
    .module-detail-page {
      display: none;
      min-height: 100vh;
    }

    .module-detail-page.active {
      display: block;
    }

    .main-module-list.hidden {
      display: none;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 0;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .breadcrumb a {
      color: var(--text-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .breadcrumb a:hover {
      color: var(--accent);
    }

    .breadcrumb-separator {
      color: var(--text-muted);
    }

    .module-banner {
      width: 100%;
      min-height: 400px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      padding: 2rem;
    }

    .module-banner-content {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }


    .module-detail-content {
      max-width: 72rem;
      margin-left: auto;
      margin-right: auto;
      padding-left: 1rem;
      padding-right: 1rem;
      padding-bottom: 2rem;
    }

    .module-detail-title {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: 3rem;
    }

    .youtube-button-container {
      display: flex;
      justify-content: center;
      margin: 2rem 0;
    }

    .youtube-button {
      background: #ff0000;
      color: white;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1.125rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .youtube-button:hover {
      background: #cc0000;
      transform: translateY(-2px);
    }

    .youtube-button svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .action-buttons-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .pdf-button {
      background: #dc2626;
      color: white;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1.125rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.2s ease, transform 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .pdf-button:hover {
      background: #b91c1c;
      transform: translateY(-2px);
    }

    .pdf-button svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .materials-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .module-description {
      max-width: 800px;
      margin: 0 auto 3rem;
      padding: 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 0.5rem;
      color: var(--text-main);
      font-size: 1.125rem;
      line-height: 1.8;
      text-align: center;
    }

    .materials-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: white;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .materials-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .material-button {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      text-align: left;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .material-button:hover {
      background: var(--panel-bg);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .material-button .material-name {
      flex: 1;
    }

    .material-button .material-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
      opacity: 0.7;
    }

    .material-button:hover .material-icon {
      opacity: 1;
    }

    /* Back Button Styles */
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      margin-bottom: 1rem;
    }

    .back-button:hover {
      background: var(--panel-bg);
      border-color: var(--accent);
      transform: translateX(-4px);
    }

    .back-button svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
  </style>
</head>

  <script>
    // Load modules.json and render cards (works without a backend if opened from a static host)
    const categoriesEl = document.getElementById('categories');
    const levelEls = document.getElementById('levels');
    const modulesEl = document.getElementById('modules');
    const resultCount = document.getElementById('result-count');

    let selectedCat = 'All';
    let selectedLevel = 'All';
    let searchQuery = '';
    let allModules = [];
    const searchInput = document.getElementById('searchInput');

    if(searchInput) {
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase().trim();
        applyFilter();
      });
    }

    function renderModules(list) {
      modulesEl.innerHTML = '';
      list.forEach((m, i) => {
        const card = document.createElement('div');
        card.className = 'card-style rounded-lg shadow-sm transform fade-anim';
        card.dataset.cat = m.category;
        card.dataset.level = m.level;

        // Thumbnail section
        const thumbnailImg = document.createElement('div');
        thumbnailImg.className = 'module-thumbnail';

        // Use thumbnail image if provided, otherwise use gradient
        if (m.thumbnail && m.thumbnail.trim() !== '') {
          const img = document.createElement('img');
          img.src = m.thumbnail;
          img.alt = m.title;
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'cover';
          thumbnailImg.appendChild(img);
          card.dataset.thumbnail = m.thumbnail;
        } else {
          const thumbnailBg = `linear-gradient(135deg, rgba(42,98,253,0.4) 0%, rgba(42,98,253,0.2) 50%, rgba(0,0,0,0.2) 100%)`;
          thumbnailImg.style.background = thumbnailBg;
          card.dataset.thumbnailBg = thumbnailBg;
        }

        // Level badge
        const levelBadge = document.createElement('div');
        levelBadge.className = 'module-level';
        const lvlNum = Number(m.level);
        levelBadge.textContent = `Level ${lvlNum}`;
        thumbnailImg.appendChild(levelBadge);

        // Content section
        const content = document.createElement('div');
        content.className = 'module-content';

        // Title
        const title = document.createElement('h3');
        title.className = 'module-title';
        title.textContent = m.title;

        // Subtitle with play icon
        const subtitle = document.createElement('div');
        subtitle.className = 'module-subtitle';
        subtitle.innerHTML = `
          <svg class="play-icon" fill="currentColor" viewBox="0 0 20 20">
            <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
          </svg>
          <span>${m.title}</span>
        `;

        card.appendChild(thumbnailImg);
        card.appendChild(content);
        content.appendChild(title);
        content.appendChild(subtitle);

        // staggered load animation
        setTimeout(() => {
          card.classList.add('fade-in');
          card.style.opacity = '';
        }, i * 70);

        modulesEl.appendChild(card);
      });
    }

    // attach click handler when rendering: open module detail modal

    function updateCount(visible) {
      if (visible === 0) resultCount.textContent = 'Tidak ada modul ditemukan';
      else if (selectedCat === 'All' && selectedLevel === 'All') resultCount.textContent = `Menampilkan semua modul (${visible})`;
      else resultCount.textContent = `Menampilkan ${visible} modul`;
    }

    function applyFilter() {
      const filtered = allModules.filter(m => {
        // Filter khusus untuk kategori "Mulai Disini" dan "Wajib Nonton"
        if (selectedCat === 'Mulai Disini') {
          if (!(m.start_here || m.id === 1)) return false;
        } else if (selectedCat === 'Wajib Nonton') {
          if (!m.must_watch) return false;
        } else if (selectedCat !== 'All' && m.category !== selectedCat) {
          return false;
        }
        if (selectedLevel !== 'All' && String(m.level) !== selectedLevel) return false;
        
        if (searchQuery !== '') {
          const titleMatch = m.title.toLowerCase().includes(searchQuery);
          const catMatch = (m.category || '').toLowerCase().includes(searchQuery);
          if (!titleMatch && !catMatch) return false;
        }

        return true;
      });
      renderModules(filtered);
      updateCount(filtered.length);
    }

    // category clicks
    categoriesEl.addEventListener('click', e => {
      const btn = e.target.closest('button[data-cat]');
      if (!btn) return;
      categoriesEl.querySelectorAll('button').forEach(b => {
        b.classList.remove('ring', 'ring-offset-2', 'ring-offset-[#0b0b0b]', 'ring-[#2a62fd]', 'bg-[#2a62fd]', 'shadow-md', 'shadow-[#2a62fd]/40', 'text-black');
        if(!b.classList.contains('bg-[#2a62fd]')) {
           b.classList.add('bg-gray-700');
           b.classList.add('text-white');
        }
      });
      btn.classList.add('ring', 'ring-offset-2', 'ring-offset-[#0b0b0b]', 'ring-[#2a62fd]', 'bg-[#2a62fd]', 'shadow-md', 'shadow-[#2a62fd]/40', 'text-white');
      btn.classList.remove('bg-gray-700', 'bg-white', 'text-black');
      selectedCat = btn.dataset.cat;
      applyFilter();
    });

    // level clicks
    levelEls.addEventListener('click', e => {
      const btn = e.target.closest('button[data-level]');
      if (!btn) return;
      levelEls.querySelectorAll('button').forEach(b => {
        b.classList.remove('ring', 'ring-offset-2', 'ring-offset-[#1f1f1f]', 'ring-[#2a62fd]', 'shadow-md', 'shadow-[#2a62fd]/40');
      });
      btn.classList.add('ring', 'ring-offset-2', 'ring-offset-[#1f1f1f]', 'ring-[#2a62fd]', 'shadow-md', 'shadow-[#2a62fd]/40');
      selectedLevel = btn.dataset.level;
      applyFilter();
    });

    // load data/trade-with-suli.json (works when served from a web server)
    fetch('data/trade-with-suli.json')
      .then(r => r.json())
      .then(data => {
        allModules = data.modules || [];
        renderModules(allModules);
        updateCount(allModules.length);
      })
      .catch(err => {
        // fallback: if fetch fails (file://), try to load embedded default list
        console.warn('Fetch data/trade-with-suli.json failed, using embedded sample', err);
        allModules = [
          { id: 1, title: 'Investasi Dasar', category: 'Investasi', level: 0, description: 'Pengenalan investasi.' }
        ];
        renderModules(allModules);
        updateCount(allModules.length);
      });

    // Module Detail Page Elements
    const moduleDetailPage = document.getElementById('module-detail-page');
    const mainModuleList = document.querySelector('.main-module-list');
    const moduleBanner = document.getElementById('module-banner');
    const moduleBannerContent = document.getElementById('module-banner-content');
    const moduleDetailTitle = document.getElementById('module-detail-title');
    const breadcrumbTitleText = document.getElementById('breadcrumb-title-text');
    const breadcrumbModules = document.getElementById('breadcrumb-modules');
    const breadcrumbCategoryText = document.getElementById('breadcrumb-category-text');
    const materialsList = document.getElementById('materials-list');
    const moduleDescription = document.getElementById('module-description');
    const actionButtonsContainer = document.getElementById('action-buttons-container');
    const pdfButton = document.getElementById('pdf-button');

    function renderMaterials(materials, moduleTitle) {
      materialsList.innerHTML = '';

      if (!materials || materials.length === 0) {
        // Default materials if none provided
        materials = [
          { name: (moduleTitle || 'Materi') + ' - Part 1', url: 'https://www.youtube.com' },
          { name: (moduleTitle || 'Materi') + ' - Part 2', url: 'https://www.youtube.com' }
        ];
      }

      materials.forEach((material, index) => {
        const materialButton = document.createElement('a');
        materialButton.href = material.url || material.youtube_url || 'https://www.youtube.com';
        materialButton.target = '_blank';
        materialButton.className = 'material-button';
        materialButton.innerHTML = `
          <span class="material-name">${material.name || material.title || `Materi ${index + 1}`}</span>
          <svg class="material-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        `;
        materialsList.appendChild(materialButton);
      });
    }

    function openModule(data, sourceEl) {
      // Check if banner has HTML content
      if (data.banner_html && data.banner_html.trim() !== '') {
        // Use HTML content for banner
        moduleBannerContent.innerHTML = data.banner_html;
        moduleBannerContent.style.display = 'block';
        moduleBanner.style.backgroundImage = '';
        moduleBanner.style.background = data.banner_bg || 'linear-gradient(135deg, rgba(6,182,212,0.2) 0%, rgba(59,130,246,0.15) 50%, rgba(99,102,241,0.1) 100%)';
      } else {
        // Use banner image (prioritize banner_image, fallback to thumbnail)
        const bannerImage = data.banner_image || data.banner_url || data.thumbnail || sourceEl?.dataset?.thumbnail;
        moduleBannerContent.innerHTML = '';
        moduleBannerContent.style.display = 'none';

        if (bannerImage && bannerImage.trim() !== '') {
          // Use banner image
          moduleBanner.style.backgroundImage = `url("${bannerImage}")`;
          moduleBanner.style.backgroundSize = 'contain';
          moduleBanner.style.backgroundRepeat = 'no-repeat';
          moduleBanner.style.backgroundPosition = 'center';
          moduleBanner.style.backgroundColor = 'var(--page-bg)';
        } else {
          // Use gradient background
          const thumbnailBg = sourceEl?.dataset?.thumbnailBg || `linear-gradient(135deg, rgba(6,182,212,0.4) 0%, rgba(59,130,246,0.3) 50%, rgba(99,102,241,0.2) 100%)`;
          moduleBanner.style.background = thumbnailBg;
          moduleBanner.style.backgroundImage = '';
        }
      }

      // Set title
      moduleDetailTitle.textContent = data.title;
      breadcrumbTitleText.textContent = data.title;

      // Set description
      if (data.description) {
        moduleDescription.textContent = data.description;
        moduleDescription.style.display = 'block';
      } else {
        moduleDescription.style.display = 'none';
      }

      // Set PDF/Summary button
      if (data.pdf_url && data.pdf_url.trim() !== '') {
        pdfButton.href = data.pdf_url;
        actionButtonsContainer.style.display = 'flex';
      } else if (data.summary_url && data.summary_url.trim() !== '') {
        pdfButton.href = data.summary_url;
        actionButtonsContainer.style.display = 'flex';
      } else {
        actionButtonsContainer.style.display = 'none';
      }

      // Set category in breadcrumb (show the module's category instead of "Semua Modul")
      breadcrumbCategoryText.textContent = data.category || 'Semua Modul';

      // Render materials list - use materials from data if available
      renderMaterials(data.materials || data.submodules || [], data.title);

      // Hide main list and show detail page
      mainModuleList.classList.add('hidden');
      moduleDetailPage.classList.add('active');

      // Scroll to top
      window.scrollTo(0, 0);
    }

    function closeModuleDetail() {
      moduleDetailPage.classList.remove('active');
      mainModuleList.classList.remove('hidden');
    }

    // Breadcrumb navigation
    document.getElementById('breadcrumb-category').addEventListener('click', (e) => {
      e.preventDefault();
      closeModuleDetail();
    });

    breadcrumbModules.addEventListener('click', (e) => {
      e.preventDefault();
      closeModuleDetail();
    });

    // ensure any existing cards will open modal when clicked: delegate
    modulesEl.addEventListener('click', (e) => {
      const card = e.target.closest('[data-cat]');
      if (!card) return;
      // find module data from currently rendered cards by matching title text
      const titleEl = card.querySelector('h3');
      const title = titleEl ? titleEl.textContent : null;
      if (!title) return;
      const mod = allModules.find(m => m.title === title);
      if (mod) openModule(mod, card);
    });
  </script>
</body>

</html>
