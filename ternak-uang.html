<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ternak Uang — Modul</title>
  <link rel="icon" type="image/jpeg" href="image/WhatsApp Image 2025-12-05 at 22.34.51.jpeg">
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Money/Investment theme: gold/blue colors */
    :root {
      --page-bg: #0f0a0a;
      /* dark warm background */
      --banner-bg: #000000;
      /* top banner */
      --panel-bg: #1a1510;
      /* content panel with warm tint */
      --card-bg: #2a2218;
      /* module card background (golden brown) */
      --card-border: #1f1810;
      /* subtle card border */
      --text-main: #fef3c7;
      /* primary text (warm cream) */
      --text-muted: #fbbf24;
      /* muted/meta text (gold) */
      --accent: #f59e0b;
      /* accent amber/gold */
      --accent-blue: #3b82f6;
      /* blue accent */
    }

    .cat-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px
    }

    .lvl-begin {
      background-color: #10b981
    }

    .lvl-int {
      background-color: #f59e0b
    }

    .lvl-adv {
      background-color: #ef4444
    }

    .cat-invest {
      background-color: #f59e0b
    }

    .cat-live {
      background-color: #3b82f6
    }

    .cat-mind {
      background-color: #8b5cf6
    }

    .cat-trade {
      background-color: #f97316
    }

    .cat-tut {
      background-color: #10b981
    }

    .cat-money {
      background-color: #fbbf24
    }

    /* Responsive animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -1000px 0;
      }

      100% {
        background-position: 1000px 0;
      }
    }

    .fade-anim {
      opacity: 0;
      transform: translateY(8px);
    }

    .fade-in {
      animation: fadeInUp 420ms ease forwards;
    }

    /* Page and panel backgrounds */
    body,
    .min-h-screen {
      background: var(--page-bg);
      color: var(--text-main);
    }

    .bg-gray-800 {
      background-color: var(--panel-bg) !important;
    }

    .card-style {
      background: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--card-border);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      z-index: 1;
      cursor: pointer;
      padding: 0;
    }

    .module-thumbnail {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.3) 0%, rgba(251, 191, 36, 0.2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .module-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .module-content {
      padding: 1rem;
    }

    .module-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .module-subtitle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .play-icon {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
    }

    .module-level {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(0, 0, 0, 0.7);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: white;
    }

    .card-style::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, rgba(59, 130, 246, 0.05) 70%);
      transform: scale(0);
      opacity: 0;
      transition: transform 0.6s ease, opacity 0.6s ease;
      z-index: -1;
      pointer-events: none;
    }

    .card-style:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px -5px rgba(245, 158, 11, 0.25), 0 0 20px rgba(59, 130, 246, 0.1);
    }

    .card-style:hover::before {
      transform: scale(1);
      opacity: 1;
    }

    .card-style h3 {
      color: var(--text-main);
    }

    .card-style .meta {
      color: var(--text-muted);
    }

    .badge-contrast {
      background: rgba(245, 158, 11, 0.2);
      color: var(--text-main);
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
      font-weight: 600;
      border: 1px solid rgba(245, 158, 11, 0.4);
    }

    .panel-title {
      color: var(--text-main);
    }

    .result-count {
      color: var(--text-muted);
    }

    .btn-focus:focus {
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.25);
      outline: none
    }

    /* Module Detail Page Styles */
    .module-detail-page {
      display: none;
      min-height: 100vh;
    }

    .module-detail-page.active {
      display: block;
    }

    .main-module-list.hidden {
      display: none;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 0;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .breadcrumb a {
      color: var(--text-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .breadcrumb a:hover {
      color: var(--accent);
    }

    .breadcrumb-separator {
      color: var(--text-muted);
    }

    .module-banner {
      width: 100%;
      min-height: 400px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      padding: 2rem;
    }

    .module-banner-content {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }


    .module-detail-content {
      max-width: 72rem;
      margin-left: auto;
      margin-right: auto;
      padding-left: 1rem;
      padding-right: 1rem;
      padding-bottom: 2rem;
    }

    .module-detail-title {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: 3rem;
    }

    .youtube-button-container {
      display: flex;
      justify-content: center;
      margin: 2rem 0;
    }

    .youtube-button {
      background: #ff0000;
      color: white;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1.125rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .youtube-button:hover {
      background: #cc0000;
      transform: translateY(-2px);
    }

    .youtube-button svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .action-buttons-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .pdf-button {
      background: #dc2626;
      color: white;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1.125rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.2s ease, transform 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .pdf-button:hover {
      background: #b91c1c;
      transform: translateY(-2px);
    }

    .pdf-button svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .materials-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .module-description {
      max-width: 800px;
      margin: 0 auto 3rem;
      padding: 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 0.5rem;
      color: var(--text-main);
      font-size: 1.125rem;
      line-height: 1.8;
      text-align: center;
    }

    .materials-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: white;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .materials-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .material-button {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      text-align: left;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .material-button:hover {
      background: var(--panel-bg);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .material-button .material-name {
      flex: 1;
    }

    .material-button .material-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
      opacity: 0.7;
    }

    .material-button:hover .material-icon {
      opacity: 1;
    }

    /* Back Button Styles */
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      margin-bottom: 1rem;
    }

    .back-button:hover {
      background: var(--panel-bg);
      border-color: var(--accent);
      transform: translateX(-4px);
    }

    .back-button svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* Responsive improvements */
    @media (max-width: 768px) {
      .grid-responsive {
        grid-template-columns: 1fr !important;
      }

      .sidebar-mobile {
        position: sticky;
        top: 0;
        z-index: 10;
        max-height: 60vh;
        overflow-y: auto;
      }
    }
  </style>
</head>

<body>
  <div class="min-h-screen bg-[#0f0a0a]">
    <!-- Top banner -->
    <div class="w-full bg-black/100 py-4 md:py-8">
      <div class="max-w-6xl mx-auto px-4 md:px-6">
        <div class="h-auto md:h-28 flex flex-col md:flex-row items-center gap-4">
          <img src="image/WhatsApp Image 2025-12-05 at 22.34.51.jpeg" alt="ZEN APP Logo"
            class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-md" />
          <div class="text-center md:text-left">
            <h2 class="text-white text-2xl md:text-4xl font-extrabold">Upgrade your Knowledge with</h2>
            <div class="text-2xl md:text-4xl text-white font-bold">ZEN APP</div>
          </div>
        </div>
      </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:p-6 main-module-list">
      <!-- Back to Home Button -->
      <div class="mb-6">
        <a href="index.html"
          class="inline-flex items-center gap-2 text-gray-300 hover:text-white transition bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-md font-medium text-sm border border-gray-700 w-fit">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Kembali ke Home
        </a>
      </div>
      <div class="flex flex-col md:flex-row items-start md:items-center gap-4 mb-6">
        <div class="w-16 h-16 md:w-20 md:h-20 flex items-center justify-center rounded-md overflow-hidden bg-[#0c0c0c]">
          <img src="image/tu-logo.svg" alt="Ternak Uang Logo" class="w-full h-full object-cover">
        </div>
        <div>
          <h1 class="text-2xl md:text-3xl font-semibold">Ternak Uang</h1>
          <p class="text-gray-300 text-sm md:text-base">Pilih kategori untuk melihat modul.</p>
        </div>
      </div>

      <div class="mb-6">
        <div class="relative max-w-md w-full">
          <input type="text" id="searchInput" placeholder="Cari modul (Judul atau Kategori)..."
            class="w-full bg-gray-800 text-white rounded-md pl-10 pr-4 py-2 border border-gray-700 focus:border-purple-500 focus:outline-none focus:ring-1 focus:ring-purple-500 transition-colors" />
          <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </div>
      </div>

      <div class="mt-6 flex flex-col gap-4 md:gap-6">
        <main class="w-full">
          <div class="bg-[#2a2218] p-4 md:p-6 rounded-lg border border-amber-900/30">
            <div class="flex flex-col md:flex-row md:items-center justify-end mb-4 gap-4">
              <div id="result-count" class="text-gray-300 text-sm md:text-base">Memuat modul...</div>
            </div>

            <div id="modules" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              <!-- cards will be injected here -->
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- Module Detail Page -->
    <div id="module-detail-page" class="module-detail-page">
      <div class="max-w-6xl mx-auto px-4 md:px-6 pt-6">
        <!-- Back Button -->
        <button class="back-button" id="back-button" onclick="closeModuleDetail()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Kembali ke Daftar Modul
        </button>

        <!-- Breadcrumb -->
        <nav class="breadcrumb">
          <a href="ternak-uang.html" id="breadcrumb-category">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
              <path
                d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
            </svg>
            Ternak Uang
          </a>
          <span class="breadcrumb-separator">/</span>
          <a href="#" id="breadcrumb-modules">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
              <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" />
            </svg>
            <span id="breadcrumb-category-text">Semua Modul</span>
          </a>
          <span class="breadcrumb-separator">/</span>
          <span id="breadcrumb-title" style="color: white; display: flex; align-items: center; gap: 0.25rem;">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
              <path
                d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z" />
            </svg>
            <span id="breadcrumb-title-text"></span>
          </span>
        </nav>
      </div>

      <!-- Banner with Thumbnail -->
      <div id="module-banner" class="module-banner">
        <div id="module-banner-content" class="module-banner-content"></div>
      </div>

      <!-- Content -->
      <div class="module-detail-content">
        <h1 id="module-detail-title" class="module-detail-title"></h1>

        <!-- Module Description -->
        <div id="module-description" class="module-description"></div>

        <!-- Action Buttons (YouTube & PDF/Summary) -->
        <div id="action-buttons-container" class="action-buttons-container" style="display: none;">
          <a id="pdf-button" class="pdf-button" href="#" target="_blank">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z" />
            </svg>
            Download PDF / Summary
          </a>
        </div>

        <div class="materials-container">
          <h2 class="materials-title">Daftar Materi</h2>
          <div id="materials-list" class="materials-list">
            <!-- Materials will be injected here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const modulesEl = document.getElementById('modules');
    const resultCount = document.getElementById('result-count');

    let searchQuery = '';
    let allModules = [];
    const searchInput = document.getElementById('searchInput');

    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase().trim();
        applyFilter();
      });
    }

    function renderModules(list) {
      modulesEl.innerHTML = '';
      list.forEach((m, i) => {
        const card = document.createElement('div');
        card.className = 'card-style rounded-lg shadow-sm transform fade-anim';
        card.dataset.cat = m.category;

        // Thumbnail section
        const thumbnailImg = document.createElement('div');
        thumbnailImg.className = 'module-thumbnail';

        // Use thumbnail image if provided, otherwise use gradient
        if (m.thumbnail && m.thumbnail.trim() !== '') {
          const img = document.createElement('img');
          img.src = m.thumbnail;
          img.alt = m.title;
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'cover';
          thumbnailImg.appendChild(img);
          card.dataset.thumbnail = m.thumbnail;
        } else {
          thumbnailImg.style.background = `linear-gradient(135deg, rgba(245,158,11,0.4) 0%, rgba(251,191,36,0.3) 50%, rgba(59,130,246,0.2) 100%)`;
          card.dataset.thumbnailBg = thumbnailImg.style.background;
        }

        // Content section
        const content = document.createElement('div');
        content.className = 'module-content';

        // Title
        const title = document.createElement('h3');
        title.className = 'module-title';
        title.textContent = m.title;

        // Subtitle with play icon
        const subtitle = document.createElement('div');
        subtitle.className = 'module-subtitle';
        subtitle.innerHTML = `
          <svg class="play-icon" fill="currentColor" viewBox="0 0 20 20">
            <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
          </svg>
          <span>${m.title}</span>
        `;

        card.appendChild(thumbnailImg);
        card.appendChild(content);
        content.appendChild(title);
        content.appendChild(subtitle);

        setTimeout(() => {
          card.classList.add('fade-in');
          card.style.opacity = '';
        }, i * 70);

        modulesEl.appendChild(card);
      });
    }

    function updateCount(visible) {
      if (visible === 0) resultCount.textContent = 'Tidak ada modul ditemukan';
      else resultCount.textContent = `Menampilkan semua modul (${visible})`;
    }

    function applyFilter() {
      const filtered = allModules.filter(m => {
        if (searchQuery !== '') {
          const titleMatch = m.title.toLowerCase().includes(searchQuery);
          const catMatch = (m.category || '').toLowerCase().includes(searchQuery);
          if (!titleMatch && !catMatch) return false;
        }
        return true;
      });
      renderModules(filtered);
      updateCount(filtered.length);
    }

    fetch('data/ternak-uang.json')
      .then(r => r.json())
      .then(data => {
        allModules = data.modules || [];
        renderModules(allModules);
        updateCount(allModules.length);
      })
      .catch(err => {
        console.warn('Fetch data/ternak-uang.json failed, using embedded sample', err);
        allModules = [
          { id: 1, title: 'Investasi Dasar', category: 'Investasi', level: 0, description: 'Pengenalan investasi untuk pemula.' },
          { id: 2, title: 'Cara Ternak Uang', category: 'Ternak Uang', level: 1, description: 'Strategi mengembangkan uang dengan investasi.' },
          { id: 3, title: 'Portfolio Management', category: 'Investasi', level: 2, description: 'Mengelola portfolio investasi yang efektif.' }
        ];
        renderModules(allModules);
        updateCount(allModules.length);
      });

    // Module Detail Page Elements
    const moduleDetailPage = document.getElementById('module-detail-page');
    const mainModuleList = document.querySelector('.main-module-list');
    const moduleBanner = document.getElementById('module-banner');
    const moduleBannerContent = document.getElementById('module-banner-content');
    const moduleDetailTitle = document.getElementById('module-detail-title');
    const breadcrumbTitleText = document.getElementById('breadcrumb-title-text');
    const breadcrumbModules = document.getElementById('breadcrumb-modules');
    const breadcrumbCategoryText = document.getElementById('breadcrumb-category-text');
    const materialsList = document.getElementById('materials-list');
    const moduleDescription = document.getElementById('module-description');
    const actionButtonsContainer = document.getElementById('action-buttons-container');
    const pdfButton = document.getElementById('pdf-button');

    function renderMaterials(materials, moduleTitle) {
      materialsList.innerHTML = '';

      if (!materials || materials.length === 0) {
        // Default materials if none provided
        materials = [
          { name: (moduleTitle || 'Materi') + ' - Part 1', url: 'https://www.youtube.com' },
          { name: (moduleTitle || 'Materi') + ' - Part 2', url: 'https://www.youtube.com' }
        ];
      }

      materials.forEach((material, index) => {
        const materialButton = document.createElement('a');
        materialButton.href = material.url || material.youtube_url || 'https://www.youtube.com';
        materialButton.target = '_blank';
        materialButton.className = 'material-button';
        materialButton.innerHTML = `
          <span class="material-name">${material.name || material.title || `Materi ${index + 1}`}</span>
          <svg class="material-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        `;
        materialsList.appendChild(materialButton);
      });
    }

    function openModule(data, sourceEl) {
      // Get thumbnail from data or card dataset
      const thumbnail = data.thumbnail || sourceEl?.dataset?.thumbnail;

      // Check if banner has HTML content
      if (data.banner_html && data.banner_html.trim() !== '') {
        // Use HTML content for banner
        moduleBannerContent.innerHTML = data.banner_html;
        moduleBannerContent.style.display = 'block';
        moduleBanner.style.backgroundImage = '';
        moduleBanner.style.background = data.banner_bg || 'linear-gradient(135deg, rgba(245,158,11,0.2) 0%, rgba(251,191,36,0.15) 50%, rgba(59,130,246,0.1) 100%)';
      } else {
        // Use banner image (prioritize banner_image, fallback to thumbnail)
        const bannerImage = data.banner_image || data.banner_url || data.thumbnail || sourceEl?.dataset?.thumbnail;
        moduleBannerContent.innerHTML = '';
        moduleBannerContent.style.display = 'none';

        if (bannerImage && bannerImage.trim() !== '') {
          // Use banner image
          moduleBanner.style.backgroundImage = `url('${bannerImage}')`;
          moduleBanner.style.backgroundSize = 'contain';
          moduleBanner.style.backgroundRepeat = 'no-repeat';
          moduleBanner.style.backgroundPosition = 'center';
          moduleBanner.style.backgroundColor = 'var(--page-bg)';
        } else {
          // Use gradient background
          const thumbnailBg = sourceEl?.dataset?.thumbnailBg || `linear-gradient(135deg, rgba(245,158,11,0.4) 0%, rgba(251,191,36,0.3) 50%, rgba(59,130,246,0.2) 100%)`;
          moduleBanner.style.background = thumbnailBg;
          moduleBanner.style.backgroundImage = '';
        }
      }

      // Set title
      moduleDetailTitle.textContent = data.title;
      breadcrumbTitleText.textContent = data.title;

      // Set description
      if (data.description) {
        moduleDescription.textContent = data.description;
        moduleDescription.style.display = 'block';
      } else {
        moduleDescription.style.display = 'none';
      }

      // Set PDF/Summary button
      if (data.pdf_url && data.pdf_url.trim() !== '') {
        pdfButton.href = data.pdf_url;
        actionButtonsContainer.style.display = 'flex';
      } else if (data.summary_url && data.summary_url.trim() !== '') {
        pdfButton.href = data.summary_url;
        actionButtonsContainer.style.display = 'flex';
      } else {
        actionButtonsContainer.style.display = 'none';
      }

      // Set category in breadcrumb (show the module's category instead of "Semua Modul")
      breadcrumbCategoryText.textContent = data.category || 'Semua Modul';

      // Render materials list - use materials from data if available
      renderMaterials(data.materials || data.submodules || [], data.title);

      // Hide main list and show detail page
      mainModuleList.classList.add('hidden');
      moduleDetailPage.classList.add('active');

      // Scroll to top
      window.scrollTo(0, 0);
    }

    function closeModuleDetail() {
      moduleDetailPage.classList.remove('active');
      mainModuleList.classList.remove('hidden');
    }

    // Breadcrumb navigation
    document.getElementById('breadcrumb-category').addEventListener('click', (e) => {
      e.preventDefault();
      closeModuleDetail();
    });

    breadcrumbModules.addEventListener('click', (e) => {
      e.preventDefault();
      closeModuleDetail();
    });

    modulesEl.addEventListener('click', (e) => {
      const card = e.target.closest('[data-cat]');
      if (!card) return;
      const titleEl = card.querySelector('h3');
      const title = titleEl ? titleEl.textContent : null;
      if (!title) return;
      const mod = allModules.find(m => m.title === title);
      if (mod) openModule(mod, card);
    });
  </script>
</body>

</html>
